version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: "replace-in-production"
    volumes:
      - ./models:/app/models
      - ./backend/data:/app/backend/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - backend
